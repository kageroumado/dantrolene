# Lint only first-party sources; never the build output or generated files.
included:
  - Dantrolene

excluded:
  - build
  - DerivedData
  - .build
  - .swiftpm

disabled_rules:
  # Formatting handled by SwiftFormat
  - trailing_whitespace
  - trailing_comma

  # Too restrictive for this codebase
  - identifier_name
  - type_name
  - large_tuple
  - nesting
  - for_where
  - implicit_optional_initialization
  - type_body_length

  # Conflicts with SwiftUI idioms
  - multiple_closures_with_trailing_closure

  # Structure is owned by SwiftFormat; the only over-long lines left are content — UI copy and
  # log messages — which read worse broken mid-sentence.
  - line_length

force_try:
  severity: warning
force_cast:
  severity: warning

# Length limits adjusted for codebase complexity
file_length:
  warning: 1000
  error: 1200

function_body_length:
  warning: 60
  error: 120

cyclomatic_complexity:
  warning: 15
  error: 25

function_parameter_count:
  warning: 6
  error: 8

indentation: 4
